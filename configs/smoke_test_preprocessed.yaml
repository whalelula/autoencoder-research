seed: 42

data:
  root: data/MTG-Jamendo-1000-24k-mono-3s
  manifest_dir: data/MTG-Jamendo-1000-24k-mono-3s/manifests
  sample_rate: 24000
  duration_seconds: 3.0
  channels: 1
  train_random_crop: false
  peak_normalize: false
  num_workers: 8
  pin_memory: true

model:
  mert_name: m-a-p/MERT-v1-95M
  mert_layer: 9 # 95M选9，330M选18
  trust_remote_code: true
  output_activation: tanh

loss:
  mrstft_weight: 1.0
  kl_weight: 0.0001
  fft_sizes: [32, 64, 128, 256, 512, 1024, 2048]
  hop_ratio: 0.25
  use_k_weighting: true
  stereo_representations: true
  eps: 1.0e-7
  spectral_contrast_eps: 1.0e-4
  log_magnitude_std_floor: 1.0e-4
  complex_distance_eps: 1.0e-5
  phase_eps: 1.0e-3
  phase_weight_floor: 1.0e-3

training:
  output_dir: runs/smoke_test_mert95m_1k_preprocessed_45epoch
  epochs: 45
  batch_size: 16
  learning_rate: 0.0002
  weight_decay: 0.01
  grad_clip_norm: 1.0
  grad_accumulation_steps: 2
  amp: true
  log_every_steps: 10
  validate_every_steps: 100
  checkpoint_every_steps: 100
  sample_every_epochs: 1
  num_listen_samples: 2
  max_validation_batches: 5
  resume_from: null

evaluation:
  batch_size: 8
  output_dir: outputs/evaluation_smoke_test_preprocessed
  export_audio: true
  max_batches: 10
  mel_n_fft: 1024
  mel_hop_length: 256
  mel_n_mels: 128
