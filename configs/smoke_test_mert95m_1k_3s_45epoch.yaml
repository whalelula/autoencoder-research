seed: 42

data:
  root: data/MTG-Jamendo-1000
  manifest_dir: data/MTG-Jamendo-1000/manifests
  sample_rate: 24000
  duration_seconds: 3.0
  channels: 1
  train_random_crop: true
  peak_normalize: false
  num_workers: 2
  pin_memory: false

model:
  mert_name: m-a-p/MERT-v1-95M
  mert_layer: 9 # 95M选9，330M选18
  trust_remote_code: true
  output_activation: tanh
  detail_aware:
    enabled: true
    depth: 6
    cross_attention: true
    mlp_ratio: 4.0
    qkv_bias: true
    projection_dropout: 0.0
    attention_dropout: 0.0
    drop_path_rate: 0.0
    layer_scale_init: null

loss:
  mrstft_weight: 1.0
  kl_weight: 0.0001
  fft_sizes: [32, 64, 128, 256, 512, 1024, 2048]
  hop_ratio: 0.25
  use_k_weighting: true
  stereo_representations: true
  eps: 1.0e-7
  spectral_contrast_eps: 1.0e-4
  log_magnitude_std_floor: 1.0e-4
  complex_distance_eps: 1.0e-5
  phase_eps: 1.0e-3
  phase_weight_floor: 1.0e-3

training:
  output_dir: runs/smoke_test_mert95m_1k_fixed_45epoch
  epochs: 45
  batch_size: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  grad_clip_norm: 1.0
  grad_accumulation_steps: 4
  amp: false
  log_every_steps: 10
  validate_every_steps: 50
  checkpoint_every_steps: 50
  sample_every_epochs: 1
  num_listen_samples: 2
  max_validation_batches: 5
  resume_from: null

evaluation:
  batch_size: 4
  output_dir: outputs/evaluation_smoke_test
  export_audio: true
  max_batches: 10
  mel_n_fft: 1024
  mel_hop_length: 256
  mel_n_mels: 128
