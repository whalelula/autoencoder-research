seed: 42

data:
  root: data/MTG-Jamendo-1000-24k-mono-5s
  manifest_dir: data/MTG-Jamendo-1000-24k-mono-5s/manifests
  sample_rate: 24000
  duration_seconds: 5.0
  channels: 1
  preprocessing:
    source_root: data/MTG-Jamendo-1000
    source_manifest_dir: data/MTG-Jamendo-1000/manifests
    workers: 8
    drop_last: true
    overwrite: false
  num_workers: 4
  pin_memory: true

model:
  mert_name: m-a-p/MERT-v1-330M
  mert_layer: 18 # 95M选9，330M选18
  trust_remote_code: true
  output_activation: tanh
  detail_aware:
    enabled: true
    depth: 6
    cross_attention: true
    mlp_ratio: 4.0
    qkv_bias: true
    projection_dropout: 0.0
    attention_dropout: 0.0
    drop_path_rate: 0.0
    layer_scale_init: null

loss:
  mrstft_weight: 1.0
  kl_weight: 0.0001
  fft_sizes: [32, 64, 128, 256, 512, 1024, 2048]
  hop_ratio: 0.25
  use_k_weighting: true
  stereo_representations: true
  eps: 1.0e-7
  spectral_contrast_eps: 1.0e-4
  log_magnitude_std_floor: 1.0e-4
  complex_distance_eps: 1.0e-5
  phase_eps: 1.0e-3
  phase_weight_floor: 1.0e-3

training:
  output_dir: runs/dam_mert330m_1k_5s_v2
  epochs: 5
  batch_size: 16
  lr_scheduler: warmup_cosine
  warmup_steps: 100
  peak_lr: 2.0e-4
  min_lr: 1.0e-5 # Change to 2.0e-6 for a lower final learning rate.
  weight_decay: 0.01
  grad_clip_norm: 1.0
  grad_accumulation_steps: 2
  amp: false
  log_every_steps: 20
  validate_every_steps: 100
  early_stopping_patience_steps: 500
  checkpoint_every_steps: 200
  sample_every_epochs: 5
  num_listen_samples: 3
  max_validation_batches: null
  resume_from: null

evaluation:
  batch_size: 8
  output_dir: outputs/evaluation
  export_audio: true
  max_batches: null
  mel_n_fft: 1024
  mel_hop_length: 256
  mel_n_mels: 128
